<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bloomberg 기사 요약</title>
<style>
  :root { color-scheme: dark; }
  body {
    background: #0b0e14;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
  h1 { font-size: 1.3rem; border-bottom: 1px solid #2a2f3a; padding-bottom: 12px; }
  h2 { font-size: 1rem; color: #8ab4f8; margin-top: 32px; }
  ul { list-style: none; padding: 0; margin: 8px 0 0; }
  li {
    padding: 10px 0;
    border-bottom: 1px solid #1c212b;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 8px;
  }
  .stamp { color: #6b7280; font-size: 0.8rem; font-variant-numeric: tabular-nums; }
  .tag {
    background: #1c2536;
    color: #8ab4f8;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
  }
  .tag:hover { background: #2a3550; }
  .tag.active { background: #8ab4f8; color: #0b0e14; }
  a { color: #e6e6e6; text-decoration: none; flex: 1 1 auto; }
  a:hover { text-decoration: underline; color: #8ab4f8; }
  #filterBar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    font-size: 0.85rem;
    color: #6b7280;
    min-height: 1.2em;
  }
  #resetFilter {
    display: none;
    background: none;
    border: 1px solid #2a2f3a;
    color: #8ab4f8;
    font-size: 0.8rem;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  #resetFilter:hover { border-color: #8ab4f8; }
</style>
</head>
<body>
<h1>Bloomberg 기사 요약</h1>
<div id="filterBar">
  <span id="filterStatus">태그를 클릭하면 그 주제만 모아 볼 수 있습니다.</span>
  <button id="resetFilter" type="button">전체 보기</button>
</div>
<!-- SECTIONS -->
<script>
document.addEventListener('click', function (e) {
  var tag = e.target.closest('.tag');
  if (tag) {
    filterByTag(tag.textContent);
    return;
  }
  if (e.target.closest('#resetFilter')) {
    showAll();
  }
});

function filterByTag(tagName) {
  document.querySelectorAll('.tag').forEach(function (t) {
    t.classList.toggle('active', t.textContent === tagName);
  });
  document.querySelectorAll('section').forEach(function (section) {
    var visibleCount = 0;
    section.querySelectorAll('li').forEach(function (li) {
      var tags = Array.from(li.querySelectorAll('.tag')).map(function (t) { return t.textContent; });
      var match = tags.indexOf(tagName) !== -1;
      li.style.display = match ? '' : 'none';
      if (match) visibleCount++;
    });
    section.style.display = visibleCount > 0 ? '' : 'none';
  });
  document.getElementById('filterStatus').textContent = '"' + tagName + '" 태그만 보는 중';
  document.getElementById('resetFilter').style.display = 'inline-block';
}

function showAll() {
  document.querySelectorAll('.tag').forEach(function (t) { t.classList.remove('active'); });
  document.querySelectorAll('li, section').forEach(function (el) { el.style.display = ''; });
  document.getElementById('filterStatus').textContent = '태그를 클릭하면 그 주제만 모아 볼 수 있습니다.';
  document.getElementById('resetFilter').style.display = 'none';
}
</script>
</body>
</html>
