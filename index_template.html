<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bloomberg 기사 요약</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    background: #0b0e14;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    margin: 0;
  }
  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    align-items: flex-start;
  }
  .list-pane {
    flex: 1 1 60%;
    min-width: 0;
    padding: 24px 16px 60px;
  }
  .detail-pane {
    flex: 1 1 40%;
    min-width: 280px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 24px 20px 60px;
    border-left: 1px solid #1c212b;
    background: #0e121a;
  }
  h1 { font-size: 1.3rem; border-bottom: 1px solid #2a2f3a; padding-bottom: 12px; }
  h2 { font-size: 1rem; color: #8ab4f8; margin-top: 32px; }
  ul { list-style: none; padding: 0; margin: 8px 0 0; }
  li {
    padding: 10px 0;
    border-bottom: 1px solid #1c212b;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 8px;
  }
  .stamp { color: #6b7280; font-size: 0.8rem; font-variant-numeric: tabular-nums; }
  .tag {
    background: #1c2536;
    color: #8ab4f8;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
  }
  a.itemLink { color: #e6e6e6; text-decoration: none; flex: 1 1 auto; cursor: pointer; }
  a.itemLink:hover, a.itemLink.active { text-decoration: underline; color: #8ab4f8; }
  .detail-placeholder { color: #6b7280; font-size: 0.9rem; }
  .detail-tags { margin-bottom: 8px; }
  .detail-pane h2.detail-title { color: #e6e6e6; font-size: 1.05rem; margin: 8px 0 16px; }
  .detail-summary { line-height: 1.6; font-size: 0.92rem; color: #cbd2dc; white-space: pre-wrap; }
  .detail-link {
    display: inline-block;
    margin-top: 20px;
    color: #8ab4f8;
    font-size: 0.85rem;
    text-decoration: none;
  }
  .detail-link:hover { text-decoration: underline; }
  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    .detail-pane { position: static; height: auto; width: 100%; border-left: none; border-top: 1px solid #1c212b; }
  }
</style>
</head>
<body>
<div class="layout">
<main class="list-pane">
<h1>Bloomberg 기사 요약</h1>
<!-- SECTIONS -->
</main>
<aside class="detail-pane" id="detailPane">
<p class="detail-placeholder">왼쪽에서 기사를 클릭하면 여기에 요약이 표시됩니다.</p>
</aside>
</div>
<script>
document.addEventListener('click', function (e) {
  var link = e.target.closest('.itemLink');
  if (!link) return;
  e.preventDefault();
  document.querySelectorAll('.itemLink.active').forEach(function (el) { el.classList.remove('active'); });
  link.classList.add('active');

  var tags = (link.dataset.tags || '').split(',').filter(Boolean)
    .map(function (t) { return '<span class="tag">' + t + '</span>'; }).join('');
  var pane = document.getElementById('detailPane');
  pane.innerHTML =
    '<div class="detail-tags">' + tags + '</div>' +
    '<h2 class="detail-title"></h2>' +
    '<p class="detail-summary"></p>' +
    '<a class="detail-link" target="_blank" rel="noopener">원문 보기 →</a>';
  pane.querySelector('.detail-title').textContent = link.textContent;
  pane.querySelector('.detail-summary').textContent = link.dataset.summary || '요약 없음';
  pane.querySelector('.detail-link').href = link.href;
});
</script>
</body>
</html>
